# Addis Ababa RTA dataset (PRIMARY, multiclass).
# Accident-level records. TARGET = accident severity, used as the driver-level
# risk proxy, predicted from interpretable driver + vehicle + environment features.
# This is a SEPARATE pipeline from Porto Seguro. Never merge the datasets.

name: addis
kind: multiclass
description: >
  Addis Ababa Road Traffic Accident data. Predict accident severity
  (Slight / Serious / Fatal) as a risk-level proxy.

paths:
  raw: data/raw/RTA Dataset.csv
  processed_dir: data/processed
  artifacts_dir: ml/artifacts

target:
  column: Accident_severity
  # Ordered by ascending severity -> stable integer codes 0, 1, 2.
  classes:
    - Slight Injury
    - Serious Injury
    - Fatal Injury
  label_map:
    "Fatal injury": "Fatal Injury"   # normalize inconsistent raw casing

# ---------------------------------------------------------------------------
# Cleaning (deterministic, leakage-safe; applied to the full dataset).
# leakage_columns are post-accident casualty/outcome fields -- NOT pre-accident
# features. Casualty_severity is effectively a target proxy. Dropped to prevent
# target leakage.
# ---------------------------------------------------------------------------
clean:
  leakage_columns:
    - Number_of_casualties
    - Casualty_class
    - Sex_of_casualty
    - Age_band_of_casualty
    - Casualty_severity
    - Work_of_casuality
    - Fitness_of_casuality
  time_column: Time
  time_derived: hour_of_day
  # Case-insensitive tokens treated as missing. "Other" is intentionally NOT here
  # (it is a legitimate catch-all category in this dataset).
  missing_tokens: ["", "na", "nan", "unknown"]
  categorical_fill_value: "Unknown"   # constant, parameter-free -> leakage-safe

# ---------------------------------------------------------------------------
# Feature engineering: derive the proposal's interpretable features from cleaned
# columns. Deterministic (no fitting), so safe before the split.
# ---------------------------------------------------------------------------
feature_engineering:
  # Simple 1:1 derivations (engineered_name: source_column).
  renames:
    driver_age_band: Age_band_of_driver
    driver_experience: Driving_experience
    weather: Weather_conditions
    road_surface: Road_surface_type
    light_condition: Light_conditions
    driver_sex: Sex_of_driver
    driver_education: Educational_level
    driver_vehicle_relation: Vehicle_driver_relation
    vehicle_owner: Owner_of_vehicle
    vehicle_service_year: Service_year_of_vehicle
    vehicle_defect: Defect_of_vehicle

  time_of_day:
    source: hour_of_day
    derived: time_of_day
    buckets:                # name: [start_hour, end_hour] inclusive (covers 0-23)
      Night: [0, 5]
      Morning: [6, 11]
      Afternoon: [12, 17]
      Evening: [18, 23]

  # Group the 17 raw vehicle types. Keyword = case-insensitive substring; rules
  # are evaluated in order, first match wins, else default_group. Motorcycle is
  # kept as a FIRST-CLASS category (not folded into Other). Keyword matching is
  # robust to mojibake in some raw labels (e.g. "Lorry (41?100Q)").
  vehicle_type:
    source: Type_of_vehicle
    derived: vehicle_type
    default_group: Other
    rules:
      - {keyword: "Unknown", group: "Unknown"}
      - {keyword: "Motorcycle", group: "Motorcycle"}
      - {keyword: "Bajaj", group: "Bajaj"}
      - {keyword: "Bicycle", group: "Bicycle"}
      - {keyword: "Public", group: "Public_transport"}
      - {keyword: "Taxi", group: "Taxi"}
      - {keyword: "Lorry", group: "Lorry"}
      - {keyword: "Pick up", group: "Pickup"}
      - {keyword: "Automobile", group: "Automobile"}
      - {keyword: "Stationwagen", group: "Automobile"}

# ---------------------------------------------------------------------------
# Modeling feature set (OUTPUT of feature engineering) + encoding strategy.
#   ordinal  -> OrdinalEncoder with the explicit category order below
#   onehot   -> OneHotEncoder(handle_unknown='ignore')
# Fit on TRAIN ONLY, then applied to test.
# ---------------------------------------------------------------------------
features:
  ordinal:
    driver_age_band: ["Unknown", "Under 18", "18-30", "31-50", "Over 51"]
    driver_experience: ["Unknown", "No Licence", "Below 1yr", "1-2yr", "2-5yr", "5-10yr", "Above 10yr"]
    time_of_day: ["Night", "Morning", "Afternoon", "Evening"]
    driver_education: ["Unknown", "Illiterate", "Writing & reading", "Elementary school", "Junior high school", "High school", "Above high school"]
    vehicle_service_year: ["Unknown", "Below 1yr", "1-2yr", "2-5yrs", "5-10yrs", "Above 10yr"]
  onehot:
    - vehicle_type
    - weather
    - road_surface
    - light_condition
    - driver_sex
    - driver_vehicle_relation
    - vehicle_owner
    - vehicle_defect
  numeric: []   # proposal feature set is fully categorical

encoding:
  scale_numeric: false   # tree models don't need scaling; flip to true for linear models

split:
  test_size: 0.2
  random_state: 42
  stratify: true
  k_folds: 5

feature_selection:
  enabled: true
  method: mutual_info     # mutual_info | model_importance (computed on TRAIN only)
  threshold: 0.0          # keep features with score >= threshold (0.0 keeps all; raise to prune)

baseline:
  kind: rule_based        # transparent interpretable risk rules (the model to beat)

random_state: 42
