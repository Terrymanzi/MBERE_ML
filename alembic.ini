# Alembic configuration for the mbere-ml backend.
#
# NOTE: the database URL is intentionally NOT set here -- there are no secrets in
# this file. migrations/env.py loads DATABASE_URL from .env (via the backend
# Settings) at runtime, so the same migrations target SQLite (dev) or PostgreSQL
# (prod) purely from environment configuration.

[alembic]
# Migration scripts live under the backend package.
script_location = backend/migrations

# Make the repo root importable so `import backend...` works when running
# `alembic` from the project root.
prepend_sys_path = .

# Timestamped, slugged revision filenames (e.g. 0002_20260629_add_x.py).
file_template = %%(rev)s_%%(year)d%%(month).2d%%(day).2d_%%(slug)s

# Leave blank: env.py injects the URL from settings/.env (no secrets in code).
sqlalchemy.url =

[post_write_hooks]
# (none)

# --- logging --------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
